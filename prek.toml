[[repos]]
repo = "https://github.com/Yelp/detect-secrets"
rev = "v1.5.0"

[[repos.hooks]]
id = "detect-secrets"
args = [
    "--baseline",
    ".secrets.baseline",
    "--exclude-secrets",
    "docker/secrets",
    "--exclude-files",
    "mealie/mealie_source",
    "--exclude-files",
    "arr-suite/bazarr-subcleaner",
    "--exclude-files",
    "football-pool/migrations",
]